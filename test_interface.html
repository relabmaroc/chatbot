<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relab Chatbot - Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            height: 700px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .status {
            background: #f7f7f7;
            padding: 10px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            white-space: pre-wrap;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message-meta {
            font-size: 11px;
            margin-top: 4px;
            opacity: 0.7;
        }

        .message.bot .message-meta {
            color: #666;
        }

        .message.user .message-meta {
            color: white;
            text-align: right;
        }

        .system-message {
            text-align: center;
            padding: 8px 16px;
            margin: 16px 0;
            background: #fef3c7;
            border-radius: 12px;
            font-size: 13px;
            color: #92400e;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-container {
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .quick-messages {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 8px 12px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #e5e7eb;
            transform: translateY(-1px);
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            width: fit-content;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-10px);
            }
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <a href="/dashboard.html"
                    style="color: white; text-decoration: none; font-size: 12px; border: 1px solid rgba(255,255,255,0.3); padding: 4px 10px; border-radius: 12px; background: rgba(255,255,255,0.1);">
                    ← Retour Dashboard
                </a>
                <span style="font-size: 10px; opacity: 0.7;">relab.ma</span>
            </div>
            <h1>🤖 Relab Chatbot</h1>
            <p>Test Interface - Backend-First Commercial AI</p>
        </div>

        <div class="status">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span id="statusText">Connecté</span>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div id="userInfo"
                    style="background: #eef2ff; padding: 4px 10px; border-radius: 6px; font-weight: 600; color: #4338ca; font-size: 11px;">
                    User: <span id="currentUserId">...</span>
                </div>
                <button onclick="switchUser()" class="quick-btn"
                    style="padding: 2px 8px; font-size: 10px; margin: 0;">Changer User</button>
                <button onclick="resetSession()" class="quick-btn"
                    style="padding: 2px 8px; font-size: 10px; margin: 0; color: #dc2626; border-color: #fca5a5;">Réinitialiser</button>
            </div>
            <span id="conversationId">Nouvelle conversation</span>
        </div>

        <div class="messages" id="messages">
            <div class="system-message">
                👋 Bienvenue ! Testez le chatbot Relab en tapant un message ci-dessous.
            </div>
        </div>

        <div class="input-area">
            <div class="quick-messages">
                <button class="quick-btn" onclick="sendQuickMessage('Salam, bghit nchri iPhone 15')">🇲🇦 Achat
                    (Darija)</button>
                <button class="quick-btn" onclick="sendQuickMessage('Je veux vendre mon iPhone 13')">🇫🇷
                    Reprise</button>
                <button class="quick-btn" onclick="sendQuickMessage('Tilifoun dyali mkser')">🔧 Réparation</button>
            </div>
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Tapez votre message..."
                    onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()" id="sendBtn">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        console.log("Chatbot API URL:", API_URL);
        let conversationId = null;

        // Generate or get persistent user ID
        function getUserId() {
            let id = localStorage.getItem('relab_test_user_id');
            if (!id) {
                id = 'user_' + Math.random().toString(36).substring(2, 11);
                localStorage.setItem('relab_test_user_id', id);
            }
            return id;
        }

        function updateUserIdDisplay() {
            document.getElementById('currentUserId').textContent = getUserId();
        }

        function switchUser() {
            const newId = prompt("Entrez un nouvel Identifiant Utilisateur (ex: Amine, Client_1...) :");
            if (newId && newId.trim()) {
                localStorage.setItem('relab_test_user_id', newId.trim());
                resetSession(false); // Reset session but don't clear messages if users want to see history? 
                // Actually, for testing, it's better to clear everything to avoid confusion.
                resetSession(true);
            }
        }

        function resetSession(clearMessages = true) {
            conversationId = null;
            document.getElementById('conversationId').textContent = 'Nouvelle conversation';
            updateUserIdDisplay();

            if (clearMessages) {
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = '<div class="system-message">🔄 Session réinitialisée. Nouvelle conversation commencée.</div>';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // Disable input
            input.disabled = true;
            document.getElementById('sendBtn').disabled = true;

            // Display user message
            addMessage('user', message);
            input.value = '';

            // Show typing indicator
            showTyping();

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        conversation_id: conversationId,
                        identifier: getUserId(),
                        channel: 'web'
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                // Update conversation ID
                conversationId = data.conversation_id;
                document.getElementById('conversationId').textContent =
                    `Conv: ${conversationId.substring(0, 8)}...`;

                // Hide typing
                hideTyping();

                // Display bot response
                addMessage('bot', data.message, data.intent);

                // Show handoff if needed
                if (data.should_handoff) {
                    addSystemMessage(`🔔 Transfert à un humain: ${data.handoff_reason}`);
                    if (data.metadata?.estimated_value) {
                        addSystemMessage(`💰 Valeur estimée: ${data.metadata.estimated_value} MAD`);
                    }
                }

            } catch (error) {
                hideTyping();
                addErrorMessage(`Erreur: ${error.message}. Assurez-vous que le serveur est lancé (python main.py)`);
                updateStatus('Déconnecté', false);
            } finally {
                input.disabled = false;
                document.getElementById('sendBtn').disabled = false;
                input.focus();
            }
        }

        function sendQuickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        function addMessage(role, text, intent = null) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            let metaInfo = '';
            if (intent) {
                metaInfo = `<div class="message-meta">
                    Intent: ${intent.type} (${(intent.confidence * 100).toFixed(0)}%) | 
                    Langue: ${intent.language} | 
                    Score: ${intent.monetization_score}/100
                </div>`;
            }

            messageDiv.innerHTML = `
                <div class="message-content">
                    ${text}
                    ${metaInfo}
                </div>
            `;

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'system-message';
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addErrorMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'error-message';
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message bot';
            typingDiv.innerHTML = `
                <div class="typing-indicator active">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTyping() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) {
                typingDiv.remove();
            }
        }

        function updateStatus(text, connected) {
            document.getElementById('statusText').textContent = text;
            const dot = document.querySelector('.status-dot');
            dot.style.background = connected ? '#10b981' : '#ef4444';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Test connection on load
        window.addEventListener('load', async () => {
            updateUserIdDisplay();
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    updateStatus('Connecté', true);
                    addSystemMessage('✅ Serveur connecté - Prêt à tester !');
                }
            } catch (error) {
                updateStatus('Déconnecté', false);
                addErrorMessage('⚠️ Serveur non accessible. Lancez le serveur avec: python main.py');
            }
        });
    </script>
</body>

</html>
