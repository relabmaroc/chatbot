<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relab Internal Dashboard - Vibe Coding</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --primary: #6366f1;
            --primary-light: rgba(99, 102, 241, 0.1);
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --sidebar-width: 240px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            background-color: var(--primary-light);
            color: var(--primary);
        }

        .nav-item.active {
            background-color: var(--primary);
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .header {
            height: 70px;
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .view-title {
            font-size: 20px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .date-picker {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .content-area {
            padding: 32px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Components */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
        }

        .kpi-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
        }

        .kpi-trend {
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .trend-up {
            color: var(--success);
        }

        .trend-down {
            color: var(--danger);
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--card-shadow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Table Inbox */
        .filter-bar {
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .select-filter {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background: white;
            min-width: 140px;
        }

        .data-table-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .data-table th {
            padding: 16px 24px;
            background-color: #f8fafc;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .data-table td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table tr:hover {
            background-color: #f1f5f9;
            cursor: pointer;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-bot {
            background: var(--primary-light);
            color: var(--primary);
        }

        .badge-human {
            background: #fef3c7;
            color: #d97706;
        }

        .badge-success {
            background: #d1fae5;
            color: #059669;
        }

        .channel-icon {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Utils */
        .hidden {
            display: none !important;
        }

        .loader {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        /* Specific Views */
        #view-detail .split-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
            height: calc(100vh - 150px);
        }

        .chat-timeline {
            background: white;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            box-shadow: var(--card-shadow);
        }

        .chat-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .bubble-user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bubble-bot {
            align-self: flex-start;
            background: #f1f5f9;
            color: var(--text-main);
            border-bottom-left-radius: 2px;
            border: 1px solid var(--border-color);
        }

        .bubble-human {
            align-self: flex-start;
            background: #fff7ed;
            color: #9a3412;
            border-bottom-left-radius: 2px;
            border: 1px solid #ffedd5;
        }

        .bubble-meta {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
        }

        .context-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .info-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--card-shadow);
        }

        .info-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .data-label {
            color: var(--text-secondary);
        }

        .data-value {
            font-weight: 500;
        }

        /* VUE D - Insights */
        .insight-card {
            border-left: 4px solid var(--primary);
            transition: all 0.2s;
        }

        .insight-card:hover {
            background-color: #f8fafc;
        }
    </style>
</head>

<body>

    <!-- CORE JS -->
    <script>
        // REAL DATA HANDLERS
        let REAL_CONVERSATIONS = [];
        let ANALYTICS_DATA = null;

        const API_BASE = window.location.origin;

        async function fetchDashboardData() {
            try {
                const [convResponse, summaryResponse] = await Promise.all([
                    fetch(`${API_BASE}/api/dashboard/conversations`),
                    fetch(`${API_BASE}/analytics/summary`)
                ]);

                REAL_CONVERSATIONS = await convResponse.json();
                ANALYTICS_DATA = await summaryResponse.json();

                console.log("Data loaded:", { REAL_CONVERSATIONS, ANALYTICS_DATA });
            } catch (err) {
                console.error("Error fetching dashboard data:", err);
            }
        }

        // ROUTER SYSTEM
        const router = {
            currentView: 'overview',
            navigate(viewId, params = {}) {
                this.currentView = viewId;

                // Update UI Navigation
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                const navEl = document.getElementById(`nav-${viewId}`);
                if (navEl) navEl.classList.add('active');

                // Update Header
                const titleMap = { 'overview': 'Pilotage Overview', 'inbox': 'Inbox Conversations', 'detail': 'Conversation Detail', 'insights': 'Insights Social Content' };
                document.getElementById('header-title').innerText = titleMap[viewId] || 'Dashboard';

                // Render Content
                const container = document.getElementById('view-container');
                const template = document.getElementById(`tpl-${viewId}`);

                if (template) {
                    container.innerHTML = '';
                    container.appendChild(template.content.cloneNode(true));
                    lucide.createIcons();
                    this.onViewLoaded(viewId, params);
                }
            },

            async onViewLoaded(viewId, params) {
                if (viewId === 'overview') {
                    await fetchDashboardData();
                    this.renderOverview();
                }
                if (viewId === 'inbox') {
                    await fetchDashboardData();
                    this.renderInbox();
                }
                if (viewId === 'detail') {
                    this.renderDetail(params.id);
                }
                if (viewId === 'insights') {
                    this.initInsightsCharts();
                }
            },

            renderOverview() {
                if (!ANALYTICS_DATA) return;

                // Update KPI values
                const kpis = document.querySelectorAll('.kpi-value');
                if (kpis[0]) kpis[0].innerText = ANALYTICS_DATA.total_conversations.toLocaleString();
                if (kpis[1]) kpis[1].innerText = `${ANALYTICS_DATA.bot_ratio}% / ${ANALYTICS_DATA.human_ratio}%`;
                if (kpis[2]) kpis[2].innerText = `${ANALYTICS_DATA.credit_interest_ratio}%`;
                if (kpis[3]) kpis[3].innerText = ANALYTICS_DATA.top_subject || "N/A";

                // Trends (mocked logic based on real counts)
                const trends = document.querySelectorAll('.kpi-trend');
                if (trends[0]) trends[0].innerText = `+${ANALYTICS_DATA.recent_conversations} récents`;

                // Update real questions
                const qList = document.getElementById('top-questions-list');
                if (qList && ANALYTICS_DATA.recent_questions && ANALYTICS_DATA.recent_questions.length > 0) {
                    qList.innerHTML = ANALYTICS_DATA.recent_questions.map(q =>
                        `<li style="font-size: 14px; padding: 10px; background: #f8fafc; border-radius: 8px;">"${q}"</li>`
                    ).join('');
                }

                this.initOverviewCharts();
            },

            initOverviewCharts() {
                const ctxVol = document.getElementById('chart-volume').getContext('2d');

                // Real labels and data from API
                const labels = ANALYTICS_DATA.daily_volume.map(d => d.day);
                const data = ANALYTICS_DATA.daily_volume.map(d => d.count);

                new Chart(ctxVol, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Conversations',
                            data: data,
                            borderColor: '#6366f1',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } } }
                });

                const ctxInt = document.getElementById('chart-intent').getContext('2d');
                if (ANALYTICS_DATA && ctxInt) {
                    new Chart(ctxInt, {
                        type: 'doughnut',
                        data: {
                            labels: Object.keys(ANALYTICS_DATA.leads_by_intent),
                            datasets: [{
                                data: Object.values(ANALYTICS_DATA.leads_by_intent).length ? Object.values(ANALYTICS_DATA.leads_by_intent) : [1],
                                backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444']
                            }]
                        },
                        options: { responsive: true, cutout: '70%' }
                    });
                }
            },

            renderInbox() {
                const tbody = document.getElementById('inbox-tbody');
                tbody.innerHTML = '';

                if (REAL_CONVERSATIONS.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px;">Aucune conversation réelle trouvée dans la base de données.</td></tr>';
                    return;
                }

                REAL_CONVERSATIONS.forEach(convo => {
                    const dateObj = new Date(convo.date);
                    const dateStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    const tr = document.createElement('tr');
                    tr.onclick = () => this.navigate('detail', { id: convo.id });
                    tr.innerHTML = `
                        <td>Today ${dateStr}</td>
                        <td class="channel-icon"><i data-lucide="${convo.channel === 'whatsapp' ? 'phone' : convo.channel}" size="14"></i> ${convo.channel}</td>
                        <td>${convo.contact}</td>
                        <td><span class="badge badge-bot">${convo.intent}</span></td>
                        <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${convo.topic}</td>
                        <td><span class="badge ${convo.status === 'bot' ? 'badge-bot' : 'badge-human'}">${convo.status}</span></td>
                        <td><span class="${convo.credit === 'OUI' ? 'trend-up' : ''}">${convo.credit}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
                lucide.createIcons();
            },

            async renderDetail(id) {
                const convo = REAL_CONVERSATIONS.find(c => c.id === id);
                if (!convo) return;

                // Set Header
                document.getElementById('header-title').innerText = `Conversation avec ${convo.contact}`;

                const container = document.getElementById('chat-messages');
                container.innerHTML = '<div class="loader"><i data-lucide="loader-2" class="animate-spin" size="24"></i></div>';
                lucide.createIcons();

                try {
                    const response = await fetch(`${API_BASE}/conversations/${id}`);
                    const data = await response.json();

                    container.innerHTML = '';
                    data.messages.forEach(msg => {
                        const dateObj = new Date(msg.created_at);
                        const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                        const bubble = document.createElement('div');
                        bubble.className = `chat-bubble bubble-${msg.sender}`;
                        bubble.innerHTML = `
                            ${msg.content}
                            <div class="bubble-meta">${timeStr}</div>
                        `;
                        container.appendChild(bubble);
                    });
                    container.scrollTop = container.scrollHeight;

                    // Set Intelligence Panel
                    document.getElementById('detail-intent').innerText = data.conversation.intent_type || "N/A";
                    document.getElementById('detail-product').innerText = data.conversation.monetization_score > 0 ? "Potential User" : "Visitor";
                    document.getElementById('detail-credit').innerText = data.conversation.estimated_value ? `${data.conversation.estimated_value} MAD` : "0 MAD";

                } catch (err) {
                    console.error("Error loading messages:", err);
                    container.innerHTML = '<div style="color: red; padding: 20px;">Erreur de chargement des messages.</div>';
                }

                // Add click events to actions
                const actions = document.querySelectorAll('#view-detail button');
                if (actions[0]) actions[0].onclick = () => this.handleForceHuman(convo.contact);
                if (actions[1]) actions[1].onclick = () => alert('Conversation marquée comme importante !');
            },

            handleForceHuman(contact) {
                if (confirm(`Voulez-vous forcer le transfert vers un humain pour ${contact} ?`)) {
                    alert('Transfert en cours... Un conseiller a été notifié sur WhatsApp.');
                }
            },

            handleGenerateBrief() {
                const btn = document.querySelector('button[data-lucide="wand-2"]')?.parentElement;
                if (btn) {
                    btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin" size="18"></i> Génération...';
                    lucide.createIcons();
                }

                setTimeout(() => {
                    alert(`BRIEF CONTENU SOCIAL - RELAB\n\n1. REEL : "L'iPhone 15 Pro est-il vraiment comme neuf ?" (Basé sur 120 mentions)\n2. STORY : FAQ Documents Crédit (Salarié vs Commerçant)\n3. POST : Pourquoi nous livrons à Marrakech en 48h chrono.`);
                    if (btn) {
                        btn.innerHTML = '<i data-lucide="wand-2" size="18"></i> Générer Dossier Brief (AI)';
                        lucide.createIcons();
                    }
                }, 1500);
            },

            initInsightsCharts() {
                // Add event to button
                const briefBtn = document.querySelector('button[data-lucide="wand-2"]')?.parentElement;
                if (briefBtn) briefBtn.onclick = () => this.handleGenerateBrief();

                const ctx = document.getElementById('chart-products-social').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['iPhone 15 Pro', 'iPhone 13', 'iPhone 15', 'MacBook Air'],
                        datasets: [{
                            label: 'Mentions',
                            data: [120, 95, 70, 45],
                            backgroundColor: '#6366f1'
                        }]
                    },
                    options: { indexAxis: 'y', plugins: { legend: { display: false } } }
                });
            }
        };

        // Initialize Lucide and App
        window.onload = () => {
            lucide.createIcons();
            router.navigate('overview');
        };
    </script>
</body>

</html>
